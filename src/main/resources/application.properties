# Neon (pooler) connection
spring.datasource.url=jdbc:postgresql://ep-morning-lake-ate9o7xx-pooler.c-9.us-east-1.aws.neon.tech:5432/neondb?sslmode=require
spring.datasource.username=neondb_owner
