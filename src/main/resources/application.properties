spring.application.name=finatiol-productos-ms

spring.config.import=optional:configserver:http://config-ms:8888

server.port=8084

eureka.client.enabled=true

eureka.client.service-url.defaultZone=http://discovery-ms:8761/eureka/

# Local/Postgres container (commented - kept for reference)
