spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true

jwt.secret=finatiolsecretkeyfinatiolsecretkey052026

minio.url=http://finatiol-minio:9000
minio.public-url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=productos

# Distributed Tracing - Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://finatiol-zipkin:9411/api/v2/spans

spring.data.redis.host=finatiol-redis
spring.data.redis.port=6379
spring.cache.type=redis